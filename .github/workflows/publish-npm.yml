name: Publish to npm

# Trusted publishing (OIDC) — no npm token or 2FA prompt. Publishes the
# `simapi` package (sdk-node) to npm using GitHub's OIDC identity.
#
# One-time setup on npmjs.com → simapi → Settings → Trusted Publisher:
#   Organization or user: TaxCollector23
#   Repository:           SimAPI-YC-
#   Workflow filename:    publish-npm.yml
#   Environment:          (leave blank)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish (OIDC)
        working-directory: sdk-node
        run: npm publish --access public
